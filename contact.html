<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vogue Vault | Fashion Collection </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .contact-form {
      padding-left: 20px;
    }

    footer {
      background: linear-gradient(90deg, #000000, #FEF4F6);
      color: #fff;
      padding: 30px 0;
      text-align: center;
      margin-top: 20px;
    }

    .btn :hover {
      color: black;
    }
  </style>
</head>

<body>
  <!-- div navbar -->

  <!-- end section 1 -->

  <!-- start section 5 -->
  <!-- contact -->
  <h1 class="display-3 text-center py-5">Contact Us</h1>
    <div class="row">
      <div class="col">
        <form class="contact-form">
          <h1>Enter Your details here</h1>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" />
          </div>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" />
            <p>We will Never share your Email with anyone else.</p>
          </div>

          <div class="mb-3">
            <label for="mobile" class="form-label">Mobile No.</label>
            <input type="tel" class="form-control" id="mobile" />
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea name="message" class="form-control" id=""></textarea>
          </div>

          <button type="submit" class="btn btn-primary">Submit</button>
        </form>
      </div>
      <div class="col">
        <h2> Or Contact also through</h2>
        <h4><i class="fa-solid fa-envelope"></i></h4>
        <p>voguevaultfashion@gmail.com</p>
        <h4><i class="fa-solid fa-phone"></i></h4>
        <p>987654321</p>
      </div>
    </div>

  <!-- Footer -->
  <footer class="text-center">
    <p class="mb-0">© 2026 VogueVault. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
</body>

</html>
